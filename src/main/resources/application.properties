# Nama Aplikasi
spring.application.name=demo

# ----------------------------------------------------
# KONFIGURASI MYSQL (DATA SOURCE)
# ----------------------------------------------------
# Sesuaikan 'uas_project_app' dengan nama database kamu di MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/uas_project_app?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root

# Kosongkan setelah tanda '=' jika XAMPP/Laragon kamu tidak pakai password
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------------------
# KONFIGURASI JPA / HIBERNATE
# ----------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'update' otomatis bikin tabel baru di MySQL berdasarkan class @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------------------
# KONFIGURASI JWT CUSTOM (DIBACA OLEH @Value)
# ----------------------------------------------------
application.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.jwt.expiration=86400000


# Mematikan cache agar perubahan file langsung terbaca
spring.thymeleaf.cache=false

# Mengaktifkan devtools restart
spring.devtools.restart.enabled=true

logging.level.org.springframework.web.socket=TRACE
logging.level.org.springframework.messaging=TRACE